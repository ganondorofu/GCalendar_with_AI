<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCalendar with AI</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <nav class="nav">
                <ul class="nav-content">
                    <li class="nav-item"><h1>📅 Google Calendar with AI</h1></li>
                    <li class="nav-item"><a href="/settings" class="settings-btn">設定</a></li>
                    <li class="nav-item"><a href="/logout" class="logout-btn">ログアウト</a></li>
                </ul>
            </nav>
        </header>
        
        <div class="main-card">
            <div class="input-section">
                <label for="userInput">カレンダーに何をしますか？</label>
                <textarea id="userInput" placeholder="例: 明日の10時に会議を追加して"></textarea>
            </div>
            
            <button id="submitBtn" class="submit-btn" onclick="sendRequest()">送信</button>
            
            <div id="resultSection" class="result-section">
                <h3>📝 結果</h3>
                <div id="resultContent" class="result-content"></div>
            </div>
            
            <div class="examples">
                <h4>💡 入力例</h4>
                <ul>
                    <li><button class="example-btn" onclick="setExample('明日の10時に会議を追加して')">予定追加</button></li>
                    <li><button class="example-btn" onclick="setExample('来週の月曜から金曜まで毎日9時に朝会を追加')">複数追加</button></li>
                    <li><button class="example-btn" onclick="setExample('今週の予定を教えて')">予定確認</button></li>
                    <li><button class="example-btn" onclick="setExample('明日は何がある？')">明日の予定</button></li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        function setExample(text) {
            document.getElementById('userInput').value = text;
        }

        async function sendRequest() {
            const userInput = document.getElementById('userInput').value;
            const resultSection = document.getElementById('resultSection');
            const resultContent = document.getElementById('resultContent');
            const submitBtn = document.getElementById('submitBtn');

            if (!userInput.trim()) {
                alert('入力してください');
                return;
            }

            // ローディング表示
            submitBtn.disabled = true;
            submitBtn.textContent = '処理中...';
            resultSection.classList.add('show');
            resultContent.innerHTML = '<div class="loading">⏳ AIが処理中です...</div>';

            try {
                const formData = new FormData();
                formData.append('value', userInput);

                // 30秒タイムアウトを設定
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 30000);

                const response = await fetch('/api/ai', {
                    method: 'POST',
                    body: formData,
                    signal: controller.signal
                });

                clearTimeout(timeoutId);

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const result = await response.text();
                resultContent.textContent = result;
            } catch (error) {
                resultContent.textContent = 'エラーが発生しました: ' + error.message;
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '送信';
            }
        }

        // Enterキーで送信
        document.getElementById('userInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendRequest();
            }
        });
    </script>
</body>
</html>
